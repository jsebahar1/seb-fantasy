<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary Meta Tags -->
    <title>SEB Fantasy — Data-Driven Sports Analytics</title>
    <meta name="title" content="SEB Fantasy — Data-Driven Sports Analytics" />
    <meta
      name="description"
      content="Data-driven sports analytics and fantasy sports tools for March Madness, NFL Fantasy, and NCAA Football. Advanced models to help you beat the competition."
    />
    <meta name="author" content="Jake Sebahar" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0d2d62" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sebfantasy.com/" />
    <meta property="og:title" content="SEB Fantasy — Data-Driven Sports Analytics" />
    <meta
      property="og:description"
      content="Data-driven sports analytics and fantasy sports tools for March Madness, NFL Fantasy, and NCAA Football."
    />
    <meta property="og:image" content="https://sebfantasy.com/logo.png" />
    <meta property="og:site_name" content="SEB Fantasy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SEB Fantasy — Data-Driven Sports Analytics" />
    <meta
      name="twitter:description"
      content="Data-driven sports analytics and fantasy sports tools for March Madness, NFL Fantasy, and NCAA Football."
    />
    <meta name="twitter:image" content="https://sebfantasy.com/logo.png" />

    <!-- Security Headers (meta fallback; set as HTTP headers in production via _headers / vercel.json) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=()"
    />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "SEB Fantasy",
        "url": "https://sebfantasy.com",
        "description": "Data-driven sports analytics and fantasy sports tools for March Madness, NFL Fantasy, and NCAA Football.",
        "author": {
          "@type": "Person",
          "name": "Jake Sebahar"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://sebfantasy.com/blog?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
